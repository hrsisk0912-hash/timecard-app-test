<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>タイムカード</title>
<style>
  :root {
    --bg:#0F0F0F; --surface:#1A1A1A; --surface2:#242424; --surface3:#2E2E2E;
    --border:#333; --border2:#444;
    --primary:#4F8EF7; --primary2:#7B5BF7; --primary-dim:rgba(79,142,247,.15);
    --green:#34C759; --yellow:#FF9F0A; --red:#FF3B30; --blue:#0A84FF;
    --text:#F2F2F7; --text2:#AEAEB2; --text3:#636366;
    --radius: 14px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
  body {
    margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    background: var(--bg); color: var(--text); padding-bottom: 76px;
  }

  /* ---------- グローバルローディングバー ---------- */
  #loadingBar {
    position: fixed; top: 0; left: 0; height: 3px; width: 100%; z-index: 100;
    background: transparent; overflow: hidden; opacity: 0; transition: opacity .2s;
  }
  #loadingBar.active { opacity: 1; }
  #loadingBar .sweep {
    position: absolute; top: 0; left: -30%; height: 100%; width: 30%;
    background: linear-gradient(90deg, transparent, var(--primary), var(--primary2), transparent);
    animation: sweep 1s linear infinite;
  }
  @keyframes sweep {
    0% { left: -30%; }
    100% { left: 100%; }
  }

  /* ---------- スピナー ---------- */
  .spinner {
    display: inline-block; width: 16px; height: 16px; border-radius: 50%;
    border: 2.5px solid rgba(255,255,255,.35); border-top-color: #fff;
    animation: spin .7s linear infinite; vertical-align: middle;
  }
  .spinner.dark { border-color: rgba(0,0,0,.15); border-top-color: var(--primary); }
  @keyframes spin { to { transform: rotate(360deg); } }
  header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 18px 16px 14px; position: sticky; top: 0; z-index: 10;
  }
  header h1 {
    margin: 0; font-size: 17px; font-weight: 700;
    background: linear-gradient(135deg, var(--primary), var(--primary2));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  header .sub { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .sync-wrap { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text3); margin-top: 4px; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
  .sync-dot.syncing { background: var(--yellow); animation: pulse 1s infinite; }
  .sync-dot.error { background: var(--red); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }

  main { padding: 14px; max-width: 520px; margin: 0 auto; }
  .tab-page { display: none; }
  .tab-page.active { display: block; }

  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px; margin-bottom: 12px;
  }
  .card h2 { font-size: 13px; margin: 0 0 10px; color: var(--text2); font-weight: 600; }

  .clock-face-card {
    text-align: center; background: var(--surface2);
    padding: 22px 16px;
  }
  .clock-face {
    font-size: 46px; font-weight: 800; color: #fff; letter-spacing: 1px;
    font-variant-numeric: tabular-nums; line-height: 1.1;
  }
  .clock-date { font-size: 13px; color: var(--primary); margin-top: 6px; }

  .staff-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .staff-chip {
    padding: 14px 6px; border-radius: 12px; border: 1.5px solid var(--border);
    background: var(--surface2); text-align: center; font-size: 13px; font-weight: 600;
    color: var(--text); transition: transform .1s ease, background .15s, border-color .15s, filter .1s;
  }
  .staff-chip.selected { border-color: var(--primary); background: var(--primary-dim); }
  .staff-chip.btn-pressed, .staff-chip:active { transform: scale(0.92); filter: brightness(0.85); }
  .staff-chip .status-dot { display: block; font-size: 10px; color: var(--text3); margin-top: 4px; font-weight: 400; }
  .staff-chip.working .status-dot { color: var(--green); }

  .clock-status { text-align: center; margin: 18px 0; }
  .clock-status .name { font-size: 18px; font-weight: 700; }
  .clock-status .state { font-size: 13px; color: var(--text2); margin-top: 4px; }

  .btn { border: none; border-radius: 12px; padding: 16px; font-size: 16px; font-weight: 700;
    width: 100%; cursor: pointer; transition: transform .1s ease, filter .1s, box-shadow .1s;
    display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn.btn-pressed, .btn:active:not(:disabled) { transform: scale(0.94); filter: brightness(0.8); box-shadow: inset 0 2px 6px rgba(0,0,0,.25); }
  .btn-in { background: var(--green); color: #fff; }
  .btn-out { background: var(--red); color: #fff; }
  .btn-secondary { background: var(--surface2); border: 1.5px solid var(--border2); color: var(--text); }
  .btn-small { padding: 8px 14px; font-size: 13px; border-radius: 10px; width: auto; }
  .btn:disabled { opacity: 0.35; pointer-events: none; }
  .btn.is-loading { pointer-events: none; opacity: 0.85; }

  .tappable { cursor: pointer; transition: transform .1s ease, filter .1s, background .12s; }
  .tappable.btn-pressed, .tappable:active { transform: scale(0.97); filter: brightness(0.8); background: var(--surface3); }

  .record-row { display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; border-radius: 8px; }
  .record-row:last-child { border-bottom: none; }
  .record-row .rname { font-weight: 600; color: var(--text); }
  .record-row .rtime { color: var(--text2); }
  .badge { font-size: 11px; padding: 3px 8px; border-radius: 20px; }
  .badge.pending { background: rgba(255,159,10,.15); color: var(--yellow); }
  .badge.approved { background: rgba(52,199,89,.15); color: var(--green); }

  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  .field input, .field select {
    width: 100%; padding: 10px; border: 1.5px solid var(--border); background: var(--surface2);
    color: var(--text); border-radius: 8px; font-size: 14px; font-family: inherit;
  }
  .field input:focus, .field select:focus { outline: none; border-color: var(--primary); }

  nav.tabbar {
    position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface);
    display: flex; border-top: 1px solid var(--border); z-index: 20;
  }
  nav.tabbar button {
    flex: 1; border: none; background: none; padding: 10px 0 8px; font-size: 11px;
    color: var(--text3); display: flex; flex-direction: column; align-items: center; gap: 2px;
    transition: transform .1s ease, opacity .1s;
  }
  nav.tabbar button.btn-pressed, nav.tabbar button:active { transform: scale(0.88); opacity: 0.7; }
  nav.tabbar button .icon { font-size: 20px; }
  nav.tabbar button.active { color: var(--primary); font-weight: 700; }
  .nav-badge {
    display: inline-block; margin-left: 3px; background: var(--red); color: #fff;
    font-size: 9px; font-weight: 700; border-radius: 10px; padding: 1px 5px; vertical-align: top;
  }

  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 30;
    align-items: flex-end;
  }
  .modal-overlay.open { display: flex; }
  .modal-sheet {
    background: var(--surface); border: 1px solid var(--border); width: 100%;
    border-radius: 18px 18px 0 0; padding: 20px; max-height: 85vh; overflow-y: auto;
  }
  .modal-sheet h3 { margin-top: 0; color: var(--text); }

  .toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: var(--surface3); border: 1px solid var(--border2); color: #fff; padding: 10px 18px;
    border-radius: 20px; font-size: 13px; opacity: 0; transition: opacity .3s; z-index: 40; pointer-events: none;
  }
  .toast.show { opacity: 1; }

  .row-flex { display: flex; gap: 8px; }
  .empty-state { text-align: center; color: var(--text3); font-size: 13px; padding: 20px 0; }
</style>
</head>
<body>

<div id="loadingBar"><div class="sweep"></div></div>

<header>
  <h1 id="storeName">タイムカード</h1>
  <div class="sub">出退勤の打刻管理</div>
  <div class="sync-wrap"><div class="sync-dot" id="syncDot"></div><span id="syncLabel">同期済み</span></div>
</header>

<main>

  <!-- ==================== 打刻タブ ==================== -->
  <section class="tab-page active" id="page-clock">
    <div class="card clock-face-card">
      <div class="clock-face" id="liveClock">--:--:--</div>
      <div class="clock-date" id="liveClockDate">-</div>
    </div>

    <div class="card">
      <h2>スタッフを選択</h2>
      <div class="staff-grid" id="staffGrid"></div>
    </div>

    <div class="card">
      <div class="clock-status">
        <div class="name" id="selectedStaffName">未選択</div>
        <div class="state" id="selectedStaffState">-</div>
      </div>
      <button class="btn btn-in" id="btnClockIn" disabled>出勤する</button>
      <div style="height:8px"></div>
      <button class="btn btn-out" id="btnClockOut" disabled>退勤する</button>
      <div style="height:8px"></div>
      <button class="btn btn-secondary" id="btnBreakStart" style="display:none;">☕ 休憩に入る</button>
      <button class="btn btn-secondary" id="btnBreakEnd" style="display:none; border-color:var(--yellow); color:var(--yellow);">▶ 休憩から戻る</button>
    </div>

    <div class="card">
      <h2>本日の打刻状況</h2>
      <div id="todayList"><div class="empty-state">読み込み中...</div></div>
    </div>
  </section>

  <!-- ==================== 管理タブ ==================== -->
  <section class="tab-page" id="page-admin">
    <div class="card" id="alertCard" style="display:none; border-color: var(--yellow);">
      <h2 style="color: var(--yellow);">⚠ 打刻漏れ</h2>
      <div id="alertList"></div>
    </div>

    <div class="card">
      <h2>日付で確認</h2>
      <div class="field">
        <input type="date" id="adminDate">
      </div>
      <div id="adminList"><div class="empty-state">日付を選択してください</div></div>
    </div>

    <div class="card">
      <h2>月次出力</h2>
      <div class="field">
        <label>対象月（設定した締め日に応じた期間で集計されます）</label>
        <input type="month" id="summaryMonth">
      </div>
      <div class="row-flex">
        <button class="btn btn-secondary btn-small" id="btnAggregate">集計する</button>
        <button class="btn btn-secondary btn-small" id="btnExportCsv">CSV出力</button>
      </div>
      <div id="summaryList" style="margin-top:12px;"></div>
    </div>

    <div class="card">
      <h2>有給休暇</h2>
      <button class="btn btn-secondary btn-small" id="btnCheckLegalLeave" style="margin-bottom:10px;">法定基準を確認</button>
      <div id="leaveList"></div>
    </div>
  </section>

  <!-- ==================== 設定タブ ==================== -->
  <section class="tab-page" id="page-settings">
    <div class="card">
      <h2>店舗設定</h2>
      <div class="field"><label>店舗名</label><input type="text" id="cfgStoreName"></div>
      <div class="field"><label>標準休憩分（休憩打刻がなかった日のフォールバック用）</label><input type="number" id="cfgBreakMin"></div>
      <div class="field">
        <label>給与計算の締め日（集計期間に反映されます）</label>
        <select id="cfgClosingDay">
          <option value="末日">末日締め（暦月そのまま集計）</option>
          <option value="20">20日締め</option>
          <option value="25">25日締め</option>
          <option value="15">15日締め</option>
          <option value="10">10日締め</option>
          <option value="5">5日締め</option>
        </select>
      </div>
      <div class="field"><label>給与支払日（記録用・保存期限の確認に使用）</label><input type="text" id="cfgPayDay" placeholder="例：翌月25日"></div>
      <div class="field">
        <label>法定休日（休日労働の判定に使用）</label>
        <select id="cfgLegalHoliday">
          <option value="日">日曜日</option>
          <option value="月">月曜日</option>
          <option value="火">火曜日</option>
          <option value="水">水曜日</option>
          <option value="木">木曜日</option>
          <option value="金">金曜日</option>
          <option value="土">土曜日</option>
        </select>
      </div>
      <div class="field"><label>所定労働時間（分／時間外判定の基準）</label><input type="number" id="cfgStandardMin" placeholder="例：480（8時間）"></div>
      <div class="field">
        <label>Sales Manager連携</label>
        <select id="cfgLinkMode">
          <option value="standalone">連携しない（standalone）</option>
          <option value="linked">連携する（linked）</option>
        </select>
      </div>
      <div class="field"><label>Sales Manager GAS URL</label><input type="text" id="cfgLinkUrl" placeholder="https://script.google.com/macros/s/.../exec"></div>
      <button class="btn btn-in" id="btnSaveConfig">設定を保存</button>
    </div>

    <div class="card">
      <h2>🔒 管理者PINの変更</h2>
      <div class="field"><label>現在のPIN</label><input type="password" inputmode="numeric" id="cfgCurrentPin" placeholder="現在のPIN"></div>
      <div class="field"><label>新しいPIN（4桁以上）</label><input type="password" inputmode="numeric" id="cfgNewPin" placeholder="新しいPIN"></div>
      <button class="btn btn-secondary" id="btnChangePin">PINを変更</button>
    </div>

    <div class="card">
      <h2>スタッフマスタ</h2>
      <div id="staffList"></div>
      <button class="btn btn-secondary" id="btnAddStaff" style="margin-top:10px;">＋ スタッフを追加</button>
    </div>
  </section>

</main>

<nav class="tabbar">
  <button class="active" data-tab="clock"><span class="icon">⏱</span>打刻</button>
  <button data-tab="admin"><span class="icon">📋</span>管理</button>
  <button data-tab="settings"><span class="icon">⚙</span>設定</button>
</nav>

<!-- 打刻修正モーダル -->
<div class="modal-overlay" id="editModal">
  <div class="modal-sheet">
    <h3>打刻を修正</h3>
    <div class="field"><label>氏名</label><div id="editStaffName" style="font-weight:700;"></div></div>
    <div class="field">
      <label>ステータス</label>
      <div><span class="badge" id="editStatusBadge">-</span> <span class="badge" id="editBreakCheckBadge" style="display:none; background:rgba(255,159,10,.15); color:var(--yellow);">⚠ 休憩不足の可能性</span></div>
    </div>
    <div class="field"><label>出勤時刻</label><input type="time" id="editIn"></div>
    <div class="field"><label>退勤時刻</label><input type="time" id="editOut"></div>
    <div class="field"><label>休憩分</label><input type="number" id="editBreak"></div>
    <div class="field"><label>備考</label><input type="text" id="editNote"></div>
    <div class="row-flex">
      <button class="btn btn-in" id="btnSaveEdit">保存</button>
      <button class="btn btn-secondary" id="btnCancelEdit">閉じる</button>
    </div>
    <div style="height:8px"></div>
    <button class="btn btn-secondary" id="btnApproveRecord">✓ 承認する</button>
    <button class="btn btn-secondary" id="btnUnapproveRecord" style="display:none; border-color:var(--yellow); color:var(--yellow);">🔓 承認解除する（編集可能に戻す）</button>
  </div>
</div>

<!-- スタッフ編集モーダル -->
<div class="modal-overlay" id="staffModal">
  <div class="modal-sheet">
    <h3>スタッフ編集</h3>
    <div class="field"><label>氏名</label><input type="text" id="staffEditName"></div>
    <div class="field">
      <label>性別</label>
      <select id="staffEditGender">
        <option value="男性">男性</option>
        <option value="女性">女性</option>
        <option value="その他">その他・未回答</option>
      </select>
    </div>
    <div class="field"><label>入社日（有給の法定付与計算に使用）</label><input type="date" id="staffEditHireDate"></div>
    <div class="field">
      <label>週所定労働日数（有給の比例付与判定に使用）</label>
      <select id="staffEditWeeklyDays">
        <option value="5">5日以上（通常付与）</option>
        <option value="4">4日</option>
        <option value="3">3日</option>
        <option value="2">2日</option>
        <option value="1">1日</option>
      </select>
    </div>
    <div class="field">
      <label>雇用形態</label>
      <select id="staffEditType" onchange="syncStaffTypeFields()">
        <option value="アルバイト">アルバイト</option>
        <option value="パート">パート</option>
        <option value="正社員">正社員</option>
        <option value="契約社員">契約社員</option>
      </select>
    </div>
    <div class="field" id="staffHourlyField"><label>時給</label><input type="number" id="staffEditHourly"></div>
    <div class="field" id="staffMonthlyField" style="display:none;"><label>月給</label><input type="number" id="staffEditMonthly"></div>
    <div class="field">
      <label>交通費タイプ</label>
      <select id="staffEditTransportType" onchange="syncTransportFields()">
        <option value="daily">日額（出勤日ごとに加算）</option>
        <option value="monthly">定期代（月1回・全額）</option>
      </select>
    </div>
    <div class="field" id="transportDailyField"><label>交通費（1出勤あたり）</label><input type="number" id="staffEditTransport" placeholder="例：500"></div>
    <div class="field" id="transportMonthlyField" style="display:none;"><label>定期代（月額）</label><input type="number" id="staffEditCommuteFee" placeholder="例：10000"></div>
    <div class="field"><label>備考</label><input type="text" id="staffEditNote" placeholder="任意"></div>
    <div class="row-flex">
      <button class="btn btn-in" id="btnSaveStaff">保存</button>
      <button class="btn btn-secondary" id="btnDeleteStaff">削除</button>
    </div>
  </div>
</div>

<!-- 有給休暇モーダル -->
<div class="modal-overlay" id="leaveModal">
  <div class="modal-sheet">
    <h3>有給休暇</h3>
    <div class="field"><label>氏名</label><div id="leaveStaffName" style="font-weight:700;"></div></div>
    <div class="field"><label>現在の残日数</label><div id="leaveBalanceDisplay" style="font-weight:700; font-size:20px;">-</div></div>
    <div class="field">
      <label>操作</label>
      <select id="leaveActionType">
        <option value="grant">付与する</option>
        <option value="use">消化する（取得日を記録）</option>
      </select>
    </div>
    <div class="field" id="leaveDateField" style="display:none;"><label>取得日</label><input type="date" id="leaveDate"></div>
    <div class="field"><label>日数（0.5＝半休）</label><input type="number" step="0.5" id="leaveDays" value="1"></div>
    <div class="field"><label>備考</label><input type="text" id="leaveNote" placeholder="任意"></div>
    <div class="row-flex">
      <button class="btn btn-in" id="btnSaveLeave">記録する</button>
      <button class="btn btn-secondary" id="btnCancelLeave">閉じる</button>
    </div>
  </div>
</div>

<!-- PIN入力モーダル -->
<div class="modal-overlay" id="pinModal">
  <div class="modal-sheet">
    <h3>🔒 管理者PIN</h3>
    <div class="field"><label>PINを入力してください</label><input type="password" inputmode="numeric" id="pinInput" placeholder="••••"></div>
    <div class="row-flex">
      <button class="btn btn-in" id="btnSubmitPin">開く</button>
      <button class="btn btn-secondary" id="btnCancelPin">閉じる</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============ 設定：GAS Web APIのデプロイURLと、設定シートのAPIキーに差し替えてください ============ */
const API_URL = 'https://script.google.com/macros/s/AKfycbx18NvBWyUOGY829l4nnyaAKq1slZbXBfMNrDRoig9FNaqlWhdE8l-aOKXQsuq6wB1o/exec';
const API_KEY = '290cd680-0e63-40e3-b9a8-6e8d38639ab0'; // スプレッドシートの「設定」シート → APIキー の値をコピー

let state = {
  staff: [],
  config: {},
  todayLog: [],
  selectedStaffId: null,
  editingStaffId: null,
};

// ---------- API呼び出し ----------
let pendingRequests = 0;
function showLoadingBar() {
  pendingRequests++;
  document.getElementById('loadingBar').classList.add('active');
}
function hideLoadingBar() {
  pendingRequests = Math.max(0, pendingRequests - 1);
  if (pendingRequests === 0) document.getElementById('loadingBar').classList.remove('active');
}

function setSyncing(st) {
  const d = document.getElementById('syncDot'), l = document.getElementById('syncLabel');
  if (!d || !l) return;
  if (st === 'syncing') { d.className = 'sync-dot syncing'; l.textContent = '同期中…'; }
  else if (st === 'error') { d.className = 'sync-dot error'; l.textContent = 'エラー'; }
  else { d.className = 'sync-dot'; l.textContent = '同期済み'; }
}

async function apiGet(action, params = {}) {
  showLoadingBar(); setSyncing('syncing');
  try {
    // _t：キャッシュバスター。GAS Web Appの中継URL（echo）が古い/無効な内容を
    // 返してしまう問題を避けるため、リクエストを毎回ユニークにする。
    const qs = new URLSearchParams({ action, key: API_KEY, _t: Date.now(), ...params }).toString();
    const res = await fetch(`${API_URL}?${qs}`, { cache: 'no-store' });
    const json = await res.json();
    setSyncing(json && json.success === false ? 'error' : 'ok');
    return json;
  } catch (err) {
    setSyncing('error');
    throw err;
  } finally {
    hideLoadingBar();
  }
}
async function apiPost(action, payload = {}) {
  showLoadingBar(); setSyncing('syncing');
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action, key: API_KEY, ...payload }),
      cache: 'no-store'
    });
    const json = await res.json();
    setSyncing(json && json.success === false ? 'error' : 'ok');
    return json;
  } catch (err) {
    setSyncing('error');
    throw err;
  } finally {
    hideLoadingBar();
  }
}

function setButtonLoading(btn, isLoading, loadingLabel) {
  if (!btn) return;
  if (isLoading) {
    btn.dataset.originalHtml = btn.innerHTML;
    btn.innerHTML = `<span class="spinner"></span>${loadingLabel ? loadingLabel : ''}`;
    btn.classList.add('is-loading');
    btn.disabled = true;
  } else {
    if (btn.dataset.originalHtml) btn.innerHTML = btn.dataset.originalHtml;
    btn.classList.remove('is-loading');
    btn.disabled = false;
  }
}

function selectStaff(staffId) {
  state.selectedStaffId = staffId;
  document.querySelectorAll('.staff-chip').forEach(c => {
    c.classList.toggle('selected', c.dataset.staffId === staffId);
  });
  const s = state.staff.find(x => x['ID'] === staffId);
  const isWorking = state.todayLog.some(r => r['スタッフID'] === staffId && !r['退勤時刻']);
  const isOnBreak = (state.openBreakStaffIds || []).includes(staffId);

  document.getElementById('selectedStaffName').textContent = s ? s['氏名'] : '未選択';
  document.getElementById('selectedStaffState').textContent = isOnBreak ? '休憩中' : (isWorking ? '出勤中' : '未出勤');
  document.getElementById('btnClockIn').disabled = isWorking;
  document.getElementById('btnClockOut').disabled = !isWorking || isOnBreak;

  document.getElementById('btnBreakStart').style.display = (isWorking && !isOnBreak) ? '' : 'none';
  document.getElementById('btnBreakEnd').style.display = isOnBreak ? '' : 'none';
}

        深夜${minToH_(r['深夜労働時間_分'])}h・時間外${minToH_(r['時間外労働時間_分'])}h・休日${minToH_(r['休日労働時間_分'])}h

function minToH_(min) { return Math.round((Number(min) || 0) / 60 * 10) / 10; }

document.getElementById('btnExportCsv').addEventListener('click', async () => {
  const month = document.getElementById('summaryMonth').value;
  const data = await apiGet('getMonthly', { month });
  if (!data.success || data.records.length === 0) {
    showToast('出力するデータがありません');
    return;
  }
  // 賃金台帳準拠フォーマット（社労士・税理士向け）
  const header = ['氏名', '性別', '賃金計算期間', '労働日数', '労働時間数', '時間外労働時間数', '休日労働時間数', '深夜労働時間数', '基本給', '交通費合計', '支給総額'];
  const rows = data.records.map(r => [
    r['氏名'],
    r['性別'] || '',
    month,
    r['出勤日数'],
    minToH_(r['労働時間数_分']),
    minToH_(r['時間外労働時間_分']),
    minToH_(r['休日労働時間_分']),
    minToH_(r['深夜労働時間_分']),
    r['基本給'],
    r['交通費合計'],
    r['支給総額'],
  ].join(','));
  const csv = '\uFEFF' + [header.join(','), ...rows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `timecard_${month}.csv`;
  a.click();
});

  document.getElementById('staffEditNote').value = '';
  syncStaffTypeFields();
  syncTransportFields();
  document.getElementById('btnDeleteStaff').style.display = 'none';
  document.getElementById('staffModal').classList.add('open');
});

document.getElementById('btnSaveStaff').addEventListener('click', async () => {
  const btn = document.getElementById('btnSaveStaff');
  const staff = {
    'ID': state.editingStaffId || '',
    '氏名': document.getElementById('staffEditName').value,
    '性別': document.getElementById('staffEditGender').value,
    '入社日': document.getElementById('staffEditHireDate').value,
    '週所定労働日数': document.getElementById('staffEditWeeklyDays').value,
    '雇用形態': document.getElementById('staffEditType').value,
    '時給': document.getElementById('staffEditHourly').value,
    '月給': document.getElementById('staffEditMonthly').value,
    '交通費タイプ': document.getElementById('staffEditTransportType').value,
    '交通費': document.getElementById('staffEditTransport').value,
    '定期代': document.getElementById('staffEditCommuteFee').value,
    '備考': document.getElementById('staffEditNote').value,
  };
  setButtonLoading(btn, true, '保存中…');
  const res = await apiPost('saveStaff', { staff });
  setButtonLoading(btn, false);
  if (res.success) {
    showToast('保存しました');
    document.getElementById('staffModal').classList.remove('open');
    init();
  } else {
    showToast(res.error || '失敗しました');
  }
});

document.getElementById('btnDeleteStaff').addEventListener('click', async () => {
  if (!state.editingStaffId) return;
  if (!confirm('このスタッフを削除しますか？')) return;
  const btn = document.getElementById('btnDeleteStaff');
  setButtonLoading(btn, true, '削除中…');
  const res = await apiPost('deleteStaff', { staffId: state.editingStaffId });
  setButtonLoading(btn, false);
  if (res.success) {
    showToast('削除しました');
    document.getElementById('staffModal').classList.remove('open');
    init();
  } else {
    showToast(res.error || '失敗しました');
  }
});

// ---------- 有給休暇 ----------
function renderLeaveList() {
  const wrap = document.getElementById('leaveList');
  if (!state.staff || state.staff.length === 0) {
    wrap.innerHTML = '<div class="empty-state">スタッフが登録されていません</div>';
    return;
  }
  wrap.innerHTML = state.staff.map(s => {
    const bal = (state.leaveBalances && state.leaveBalances[s['ID']]) ? state.leaveBalances[s['ID']].balance : 0;
    const legal = state.legalLeaveResults ? state.legalLeaveResults.find(r => r.staffId === s['ID']) : null;

    let legalHtml = '';
    if (legal && legal.eligible && legal.shortfall > 0) {
      legalHtml = `
        <div class="rtime" style="color:var(--yellow); margin-top:4px;">
          法定基準：${legal.legalTotalDays}日（${legal.baseDate}時点）／不足 ${legal.shortfall}日
          ${legal.attendanceNote ? `<br>${legal.attendanceNote}（出勤率概算 ${legal.attendanceRatePct}%）` : ''}
        </div>
        <button class="btn btn-in btn-small" style="margin-top:6px;" onclick="event.stopPropagation(); quickGrantLegal('${s['ID']}', ${legal.shortfall})">法定通り ${legal.shortfall}日 付与する</button>
      `;
    } else if (legal && !legal.eligible) {
      legalHtml = `<div class="rtime" style="margin-top:4px;">${legal.reason}</div>`;
    }

    return `
    <div class="record-row tappable" data-staff-id="${s['ID']}" onclick="openLeaveModal(this)" style="cursor:pointer; display:block;">
      <div style="display:flex; justify-content:space-between;">
        <span class="rname">${s['氏名']}</span>
        <span class="rtime">残 ${bal} 日</span>
      </div>
      ${legalHtml}
    </div>
  `;
  }).join('');
}

document.getElementById('btnCheckLegalLeave').addEventListener('click', async () => {
  const btn = document.getElementById('btnCheckLegalLeave');
  setButtonLoading(btn, true, '確認中…');
  const res = await apiGet('checkLegalLeave');
  setButtonLoading(btn, false);
  if (res.success) {
    state.legalLeaveResults = res.results;
    renderLeaveList();
    const shortfallCount = res.results.filter(r => r.eligible && r.shortfall > 0).length;
    showToast(shortfallCount > 0 ? `${shortfallCount}名に付与不足の可能性があります` : '全員、法定基準を満たしています');
  } else {
    showToast(res.error || '確認に失敗しました');
  }
});

window.quickGrantLegal = async function(staffId, days) {
  const res = await apiPost('grantLeave', { staffId, days, note: '法定基準に基づく自動計算付与' });
  if (res.success) {
    showToast('付与しました');
    init();
  } else {
    showToast(res.error || '失敗しました');
  }
};

window.openLeaveModal = function(el) {
  const staffId = el.dataset.staffId;
  const s = state.staff.find(x => x['ID'] === staffId) || {};
  const bal = (state.leaveBalances && state.leaveBalances[staffId]) ? state.leaveBalances[staffId].balance : 0;
  document.getElementById('leaveModal').dataset.staffId = staffId;
  document.getElementById('leaveStaffName').textContent = s['氏名'] || '';
  document.getElementById('leaveBalanceDisplay').textContent = bal + ' 日';
  document.getElementById('leaveActionType').value = 'grant';
  document.getElementById('leaveDate').value = new Date().toISOString().slice(0, 10);
  document.getElementById('leaveDays').value = 1;
  document.getElementById('leaveNote').value = '';
  syncLeaveFields();
  document.getElementById('leaveModal').classList.add('open');
};

function syncLeaveFields() {
  const isUse = document.getElementById('leaveActionType').value === 'use';
  document.getElementById('leaveDateField').style.display = isUse ? '' : 'none';
}
document.getElementById('leaveActionType').addEventListener('change', syncLeaveFields);

document.getElementById('btnCancelLeave').addEventListener('click', () => {
  document.getElementById('leaveModal').classList.remove('open');
});

document.getElementById('btnSaveLeave').addEventListener('click', async () => {
  const btn = document.getElementById('btnSaveLeave');
  const staffId = document.getElementById('leaveModal').dataset.staffId;
  const actionType = document.getElementById('leaveActionType').value;
  const days = document.getElementById('leaveDays').value;
  const note = document.getElementById('leaveNote').value;
  const date = document.getElementById('leaveDate').value;

  setButtonLoading(btn, true, '記録中…');
  const res = await apiPost(actionType === 'grant' ? 'grantLeave' : 'useLeave', {
    staffId, days, note, date
  });
  setButtonLoading(btn, false);
  if (res.success) {
    showToast('記録しました');
    document.getElementById('leaveModal').classList.remove('open');
    init();
  } else {
    showToast(res.error || '失敗しました');
  }
});

init();
</script>
